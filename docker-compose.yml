# ═══════════════════════════════════════════════════════════════
# Halal Guide Singapore — Full Stack Docker Compose
# 3 services: app (Node.js) + agent (Python) + searxng (search)
#
# The LLM is DeepSeek's hosted API (OpenAI-compatible) — no local
# model container. Secrets (DEEPSEEK_API_KEY, MAPBOX_TOKEN) are read
# from a gitignored .env file in this directory. See .env.example.
# ═══════════════════════════════════════════════════════════════

services:
  # ─── 1. Main Web App (Node.js + Express) ──────────────────────
  app:
    build: .
    container_name: halalguideSingapore
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - AGENT_URL=http://halal-agent:5000
      - MAPBOX_TOKEN=${MAPBOX_TOKEN:-}
    networks:
      - server-net
    depends_on:
      agent:
        condition: service_healthy
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── 2. AI Agent Service (Python + FastAPI) ───────────────────
  agent:
    build: ./agent-service
    container_name: halal-agent
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      # LLM is DeepSeek's hosted API (OpenAI-compatible). Key from .env.
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - SEARXNG_URL=http://searxng:8080
      - NOMINATIM_URL=https://nominatim.openstreetmap.org
      - PYTHONUNBUFFERED=1
    networks:
      - server-net
    depends_on:
      searxng:
        condition: service_healthy
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── 3. SearXNG (Self-hosted search engine) ──────────────────
  # SearXNG default port is 8080 — we use that instead of fighting it.
  # Config files are mounted WITHOUT a named volume to avoid shadowing.
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - server-net
    volumes:
      - ./agent-service/searxng/settings.yml:/etc/searxng/settings.yml
      - ./agent-service/searxng/limiter.toml:/etc/searxng/limiter.toml
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
      - INSTANCE_NAME=HalalGuideSG
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  server-net:
    external: true
