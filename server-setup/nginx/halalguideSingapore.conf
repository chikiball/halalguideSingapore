# Nginx reverse proxy for Halal Guide Singapore
# Deploy to: /home/nandha/server/nginx/conf.d/halalguideSingapore.conf
# Then run:  sudo docker exec nginx-gateway nginx -s reload

server {
    listen 80;
    server_name halal.nandharu.uk;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ─── Main app ───
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://halalguideSingapore:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Overpass API proxy ───
    location /api/halal {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://halalguideSingapore:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── AI Agent endpoints (SSE streaming) ───
    # These need special config: no buffering, long timeout
    location /api/ai/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://halalguideSingapore:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-critical: disable all buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # AI agent can take up to 3 minutes for full search
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # ─── Old crawl endpoint ───
    location /api/place/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://halalguideSingapore:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
